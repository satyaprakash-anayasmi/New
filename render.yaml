databases:
  - name: dms-db
    plan: free

services:
  - type: web
    name: dms-unified
    env: docker
    plan: free
    region: ohio
    dockerContext: .
    dockerfilePath: Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: API_URL
        sync: false # Set this to your live URL after the first build
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: dms-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: dms-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: dms-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin_Sec#2026
      - key: REVIEWER_PASSWORD
        value: reviewer_Sec#2026
      - key: UPLOADER_PASSWORD
        value: uploader_Sec#2026
