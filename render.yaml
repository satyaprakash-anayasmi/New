databases:
  - name: dms-db-prod-2026
    plan: free
    region: ohio

services:
  - type: web
    name: dms-unified-prod-2026
    env: docker
    plan: free
    region: ohio
    dockerContext: .
    dockerfilePath: Dockerfile
    healthCheckPath: /
    healthCheckIntervalSeconds: 30
    healthCheckTimeoutSeconds: 15
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: RENDER_DB_URL
        fromDatabase:
          name: dms-db-prod-2026
          property: externalConnectionString
      - key: RENDER_DB_USER
        fromDatabase:
          name: dms-db-prod-2026
          property: user
      - key: RENDER_DB_PASS
        fromDatabase:
          name: dms-db-prod-2026
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin_Sec#2026
      - key: REVIEWER_PASSWORD
        value: reviewer_Sec#2026
      - key: UPLOADER_PASSWORD
        value: uploader_Sec#2026
