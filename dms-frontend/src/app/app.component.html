<app-toast></app-toast>
<ng-container *ngIf="!isLoginPage">
  <div class="flex h-screen bg-[#05070a] overflow-hidden relative font-['Outfit']">
    <!-- Animated background ambient glow -->
    <div
      class="absolute top-0 right-0 w-[500px] h-[500px] bg-indigo-600/5 blur-[120px] rounded-full pointer-events-none">
    </div>
    <div
      class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-purple-600/5 blur-[120px] rounded-full pointer-events-none">
    </div>

    <!-- Mobile Sidebar Overlay -->
    <button *ngIf="sidebarOpen" (click)="sidebarOpen = false" type="button" aria-label="Close sidebar"
      title="Close sidebar"
      class="fixed inset-0 bg-black/60 z-40 lg:hidden backdrop-blur-md transition-all duration-500 focus:outline-none"></button>

    <!-- Sidebar -->
    <app-sidebar [class.translate-x-0]="sidebarOpen"
      class="fixed inset-y-0 left-0 z-50 transform -translate-x-full lg:translate-x-0 lg:static transition-all duration-500 cubic-bezier(0.4, 0, 0.2, 1)"></app-sidebar>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden relative">
      <!-- Header -->
      <header
        class="h-20 bg-slate-950/40 backdrop-blur-xl flex items-center justify-between px-6 md:px-10 border-b border-white/5 relative z-20">
        <div class="flex items-center gap-6">
          <button (click)="toggleSidebar()" title="Toggle Sidebar" aria-label="Toggle Sidebar"
            class="lg:hidden p-2.5 bg-white/5 hover:bg-white/10 rounded-xl transition-all border border-white/10 active:scale-90">
            <svg class="h-6 w-6 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
          </button>
          <div>
            <h1 class="text-xl md:text-2xl font-bold text-white tracking-tight">DMS <span
                class="text-indigo-500">Portal</span></h1>
            <p class="hidden md:block text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em] mt-0.5">Enterprise
              Document Management</p>
          </div>
        </div>

        <div class="flex items-center gap-4 md:gap-8">
          <div class="hidden sm:flex flex-col items-end">
            <span class="text-xs font-bold text-slate-400 capitalize tracking-wide">{{ roleDisplay }}</span>
            <span class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest animate-pulse">● System
              Online</span>
          </div>

          <div class="h-10 w-[1px] bg-white/10 hidden sm:block"></div>

          <button (click)="logout()"
            class="group relative flex items-center gap-2 bg-white/5 hover:bg-white/10 text-white px-5 py-2.5 rounded-xl text-sm transition-all font-bold border border-white/10 shadow-lg active:scale-95 overflow-hidden">
            <div
              class="absolute inset-0 bg-gradient-to-r from-indigo-500/10 to-purple-500/10 translate-x-[-100%] group-hover:translate-x-0 transition-transform duration-500">
            </div>
            <svg class="w-4 h-4 text-slate-400 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            <span class="relative">Logout</span>
          </button>
        </div>
      </header>

      <!-- Page Content Router -->
      <main
        class="flex-1 overflow-x-hidden overflow-y-auto p-4 md:p-10 bg-[radial-gradient(circle_at_50%_50%,_#0a0c12_0%,_#05070a_100%)]">
        <div class="max-w-7xl mx-auto animate-fade-in">
          <router-outlet></router-outlet>
        </div>
      </main>
    </div>
  </div>
</ng-container>

<router-outlet *ngIf="isLoginPage"></router-outlet>
