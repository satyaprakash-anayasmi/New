<div class="container mx-auto px-4 py-12">
    <div class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
        <div>
            <h1 class="text-4xl font-black text-gray-900 tracking-tight mb-2">{{ text.headers.review }}</h1>
            <p class="text-gray-500 font-medium">Verify and process documents submitted for review.</p>
        </div>
        <div class="px-6 py-3 bg-white rounded-2xl border border-gray-100 shadow-sm flex items-center gap-3">
            <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
            <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Protocol Active</span>
        </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-12 gap-10 items-start">
        <!-- Left Side: Document Registry -->
        <div class="xl:col-span-8 flex flex-col gap-8">
            <app-data-table title="Security Queue" [headers]="tableHeaders" [data]="documents"
                [totalElements]="totalElements" [totalPages]="totalPages" [currentPage]="currentPage"
                [pageSize]="pageSize" [isLast]="isLast" [isLoading]="isLoading" [pageSizeOptions]="[5, 10, 30]"
                [selectable]="true" [selectedItems]="selectedDocuments" (selectionChange)="onSelectionChange($event)"
                (pageChange)="loadPendingDocuments($event)" (pageSizeChange)="onPageSizeChange($event)"
                (rowClick)="selectDocument($event)">
            </app-data-table>
        </div>

        <!-- Right Side: Action Control Center (Master-Detail) -->
        <div class="xl:col-span-4 sticky top-12">
            <div *ngIf="activeDoc; else emptyDetail"
                class="bg-white rounded-[2.5rem] shadow-2xl border border-gray-100 p-8 animate-in fade-in slide-in-from-right-8 duration-500">

                <div class="flex items-center justify-between mb-8">
                    <div class="p-4 bg-indigo-600 rounded-2xl text-white shadow-lg shadow-indigo-100">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <button (click)="openDocument(activeDoc.id)"
                        class="px-5 py-2.5 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-indigo-600 transition-all shadow-sm">
                        View Artifact
                    </button>
                </div>

                <div class="mb-8">
                    <span
                        class="text-[9px] font-black text-indigo-500 uppercase tracking-[0.2em] block mb-1">Authenticating
                        Artifact</span>
                    <h2 class="text-xl font-black text-gray-900 tracking-tight line-clamp-2 leading-tight uppercase">{{
                        activeDoc.title }}</h2>
                </div>

                <!-- Decision Toggle -->
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <button (click)="toggleAction('APPROVE')" [class.bg-emerald-500]="selectedAction === 'APPROVE'"
                        [class.text-white]="selectedAction === 'APPROVE'"
                        [class.border-transparent]="selectedAction === 'APPROVE'"
                        [class.shadow-xl]="selectedAction === 'APPROVE'"
                        [class.shadow-emerald-100]="selectedAction === 'APPROVE'"
                        class="py-5 border-2 border-gray-100 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all hover:border-emerald-500 hover:text-emerald-600">
                        <span class="block">Approve</span>
                    </button>
                    <button (click)="toggleAction('REJECT')" [class.bg-rose-500]="selectedAction === 'REJECT'"
                        [class.text-white]="selectedAction === 'REJECT'"
                        [class.border-transparent]="selectedAction === 'REJECT'"
                        [class.shadow-xl]="selectedAction === 'REJECT'"
                        [class.shadow-rose-100]="selectedAction === 'REJECT'"
                        class="py-5 border-2 border-gray-100 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all hover:border-rose-500 hover:text-rose-600">
                        <span class="block">Reject</span>
                    </button>
                </div>

                <div class="space-y-6">
                    <div>
                        <label for="comments"
                            class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-4 font-mono">
                            Protocol Log Remarks
                        </label>
                        <textarea id="comments" [(ngModel)]="comments" rows="5"
                            placeholder="Enter security report feedback..."
                            class="w-full px-6 py-5 bg-gray-50 border-2 border-transparent rounded-3xl text-sm font-bold text-gray-700 outline-none focus:bg-white focus:border-indigo-600 transition-all resize-none shadow-inner"></textarea>
                    </div>

                    <div class="pt-4 flex flex-col gap-3">
                        <button (click)="submitReview()" [disabled]="!selectedAction"
                            class="w-full py-5 bg-indigo-600 text-white rounded-3xl text-sm font-black uppercase tracking-[0.2em] shadow-xl shadow-indigo-100 hover:bg-slate-900 transition-all active:scale-95 disabled:opacity-30">
                            Confirm & Sync Protocol
                        </button>
                        <button (click)="activeDoc = null; selectedDocuments = []"
                            class="w-full py-3 text-gray-400 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] hover:text-gray-600 transition-all">
                            Cancel Operation
                        </button>
                    </div>
                </div>
            </div>

            <ng-template #emptyDetail>
                <div
                    class="bg-gray-50/50 border-2 border-dashed border-gray-100 rounded-[3rem] p-12 text-center flex flex-col items-center group transition-all hover:bg-white">
                    <div
                        class="w-24 h-24 bg-white rounded-[2.5rem] shadow-sm flex items-center justify-center text-gray-200 mb-8 group-hover:scale-110 transition-transform duration-500">
                        <svg class="h-10 w-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" />
                        </svg>
                    </div>
                    <h4 class="text-gray-900 font-black text-sm uppercase tracking-widest mb-4">Focus Required</h4>
                    <p class="text-xs text-gray-400 font-bold leading-relaxed px-4">
                        Select an artifact from the queue to initialize the review protocol and process security
                        clearances.
                    </p>
                </div>
            </ng-template>
        </div>
    </div>

    <app-document-viewer [show]="showViewer" [document]="selectedDocForView" (closeViewer)="showViewer = false">
    </app-document-viewer>
</div>
