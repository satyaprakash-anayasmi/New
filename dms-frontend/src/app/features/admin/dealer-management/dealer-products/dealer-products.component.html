<div class="space-y-4">
  
  <!-- Header & Actions -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-800/50 p-4 rounded-xl border border-white/10">
    <h2 class="text-lg font-bold text-white flex items-center gap-2">
      <svg class="w-5 h-5 text-indigo-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
      </svg>
      {{ 'DEALER_PRODUCTS.TITLE' | translate }}
    </h2>
    <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
      <button (click)="toggleFilter()" class="flex items-center gap-2 px-4 py-2 bg-slate-700/50 hover:bg-slate-700 text-white rounded-lg text-sm transition-all border border-white/5 hover:border-indigo-500/30 whitespace-nowrap">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
        </svg>
        {{ isFilterOpen ? ('DEALER_PRODUCTS.CLOSE_FILTERS' | translate) : ('DEALER_PRODUCTS.SEARCH' | translate) }}
      </button>
      <button *ngIf="isAdmin" (click)="openAddModal()" class="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-semibold transition-all shadow-lg shadow-indigo-500/20 whitespace-nowrap">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        {{ 'DEALER_PRODUCTS.ADD_PRODUCT' | translate }}
      </button>
    </div>
  </div>

  <!-- Collapsible Filter Panel -->
  <div *ngIf="isFilterOpen" class="bg-slate-800/80 p-5 rounded-xl border border-white/10 shadow-lg animate-fade-in">
    <div class="flex items-end gap-4">
      <div class="flex-1">
        <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">{{ 'ADMIN.DEALER_MGMT.SEARCH' | translate }}</label>
        <div class="relative">
          <input type="text" [(ngModel)]="filters.searchTerm" [placeholder]="'DEALER_PRODUCTS.SEARCH_PLACEHOLDER' | translate" 
                 class="w-full bg-slate-900/50 border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition-colors">
          <svg class="w-4 h-4 text-slate-500 absolute right-3 top-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
      </div>
      <div class="flex items-end gap-2 shrink-0">
        <button (click)="applyFilters()" class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-semibold transition-colors shadow-lg shadow-indigo-500/20">
          {{ 'DEALER_PRODUCTS.APPLY' | translate }}
        </button>
        <button (click)="resetFilters()" class="px-4 py-2.5 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm font-semibold transition-colors">{{ 'DEALER_PRODUCTS.RESET' | translate }}</button>
      </div>
    </div>
  </div>

  <!-- Data Table Component -->
  <div class="bg-slate-800/30 rounded-xl border border-white/5 overflow-hidden">
    <app-data-table
      [title]="'DEALER_PRODUCTS.PRODUCTS_TABLE_TITLE' | translate"
      [headers]="headers"
      [data]="products"
      [totalElements]="totalItems"
      [currentPage]="page"
      [pageSize]="pageSize"
      [isLoading]="isLoading"
      [searchable]="false"
      [backendFiltering]="true"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)"
      (recover)="onRecover($event)"
      (permanentDelete)="onPermanentDelete($event)">
    </app-data-table>
  </div>

  <!-- Add/Edit Modal (Tailwind based) -->
  <div *ngIf="isModalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" (click)="closeModal()"></div>
    
    <!-- Modal Content -->
    <div class="relative bg-slate-900 border border-white/10 rounded-2xl w-full max-w-lg shadow-2xl animate-fade-in overflow-hidden">
      
      <!-- Header -->
      <div class="flex items-center justify-between p-6 border-b border-white/5 bg-slate-800/50">
        <h3 class="text-xl font-bold text-white">{{ editingProduct ? ('DEALER_PRODUCTS.MODAL_TITLE_EDIT' | translate) : ('DEALER_PRODUCTS.ADD_PRODUCT' | translate) }}</h3>
        <button (click)="closeModal()" class="text-slate-400 hover:text-white transition-colors">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Body -->
      <div class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">{{ 'ADMIN.DEALER_MGMT.COL_PRODUCT_NAME' | translate }}</label>
          <input type="text" [(ngModel)]="productForm.name" class="w-full bg-slate-950 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 transition-colors" [placeholder]="'DEALER_PRODUCTS.PLACEHOLDER_NAME' | translate">
        </div>
        
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">{{ 'ADMIN.DEALER_MGMT.COL_CATEGORY' | translate }}</label>
          <input type="text" [(ngModel)]="productForm.category" class="w-full bg-slate-950 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 transition-colors" [placeholder]="'DEALER_PRODUCTS.PLACEHOLDER_CATEGORY' | translate">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">{{ 'ADMIN.DEALER_MGMT.COL_DESCRIPTION' | translate }}</label>
          <textarea [(ngModel)]="productForm.description" rows="3" class="w-full bg-slate-950 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 transition-colors" [placeholder]="'DEALER_PRODUCTS.PLACEHOLDER_DESCRIPTION' | translate"></textarea>
        </div>

        <div>
          <app-file-upload 
            [label]="'DEALER_PRODUCTS.IMAGE_OPTIONAL' | translate"
            [currentUrl]="productForm.imageUrl"
            (uploadComplete)="onImageUploaded($event)">
          </app-file-upload>
        </div>
      </div>

      <!-- Footer -->
      <div class="flex items-center justify-end gap-3 p-6 border-t border-white/5 bg-slate-800/30">
        <button (click)="closeModal()" class="px-4 py-2 text-slate-300 hover:text-white font-medium transition-colors">{{ 'COMMON.CANCEL' | translate }}</button>
        <button (click)="saveProduct()" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg font-semibold transition-all shadow-lg shadow-indigo-500/25">
          {{ editingProduct ? ('DEALER_PRODUCTS.SAVE_CHANGES' | translate) : ('DEALER_PRODUCTS.ADD_PRODUCT' | translate) }}
        </button>
      </div>

    </div>
  </div>

</div>
