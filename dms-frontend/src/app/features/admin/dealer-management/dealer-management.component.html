<div class="space-y-6 animate-fade-in relative z-10">
  
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
    <div class="flex items-center gap-4">
      <div class="p-3 bg-indigo-500/10 rounded-xl border border-indigo-500/20">
        <svg class="w-6 h-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
        </svg>
      </div>
      <div>
        <h1 class="text-2xl font-bold text-white tracking-tight">{{ 'ADMIN.DEALER_MGMT.TITLE' | translate }}</h1>
        <p class="text-slate-400 text-sm mt-1">{{ 'ADMIN.DEALER_MGMT.SUBTITLE' | translate }}</p>
      </div>
    </div>
  </div>

  <!-- Tabs Navigation -->
  <div class="flex overflow-x-auto hide-scrollbar gap-2 p-1 bg-slate-900/50 backdrop-blur-xl border border-white/5 rounded-2xl w-full">
    <button *ngFor="let tab of visibleTabs" 
            (click)="setTab(tab.id)"
            [ngClass]="{
              'bg-indigo-500 text-white shadow-lg shadow-indigo-500/25': activeTab === tab.id,
              'text-slate-400 hover:bg-white/5': activeTab !== tab.id
            }"
            class="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-semibold transition-all whitespace-nowrap">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="tab.icon"></path>
      </svg>
      {{ tab.labelKey | translate }}
    </button>
  </div>

  <!-- Tab Content -->
  <div class="bg-slate-900/40 backdrop-blur-xl rounded-2xl border border-white/5 shadow-2xl p-6">
    <app-dealer-verification *ngIf="activeTab === 'verification'"></app-dealer-verification>
    <app-dealer-products *ngIf="activeTab === 'products'"></app-dealer-products>
    <app-dealer-assignment *ngIf="activeTab === 'assignment'"></app-dealer-assignment>
    <app-dealer-distribution *ngIf="activeTab === 'distribution'"></app-dealer-distribution>
  </div>
</div>
