<div class="space-y-6 animate-fade-in relative z-10 p-6">
  
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
    <div class="flex items-center gap-4">
      <div class="p-3 bg-teal-500/10 rounded-xl border border-teal-500/20">
        <svg class="w-6 h-6 text-teal-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <div>
        <h1 class="text-2xl font-bold text-white tracking-tight">{{ 'ADMIN.DEALER_AREA.TITLE' | translate }}</h1>
        <p class="text-slate-400 text-sm mt-1">{{ 'ADMIN.DEALER_AREA.SUBTITLE' | translate }}</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button (click)="toggleFilter()" class="flex items-center gap-2 px-4 py-2 bg-slate-800/80 hover:bg-slate-700 text-white rounded-lg text-sm transition-all border border-white/10 hover:border-teal-500/30 shadow-lg backdrop-blur-md">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
        </svg>
        {{ isFilterOpen ? ('DEALER_AREA_ASSIGNMENT.CLOSE_FILTERS' | translate) : ('DEALER_AREA_ASSIGNMENT.SEARCH' | translate) }}
      </button>
    </div>
  </div>

  <!-- Collapsible Filter Panel -->
  <div *ngIf="isFilterOpen" class="bg-slate-900/80 backdrop-blur-xl p-5 rounded-2xl border border-white/10 shadow-2xl animate-fade-in">
    <div class="flex items-end gap-4">
      <div class="flex-1">
        <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">{{ 'ADMIN.DEALER_AREA.SEARCH' | translate }}</label>
        <div class="relative">
          <input type="text" [(ngModel)]="filters.searchTerm" [placeholder]="'DEALER_AREA_ASSIGNMENT.SEARCH_PLACEHOLDER' | translate" 
                 class="w-full bg-slate-950/50 border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-teal-500 transition-colors">
          <svg class="w-4 h-4 text-slate-500 absolute right-3 top-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
      </div>
      <div class="flex items-end gap-2 shrink-0">
        <button (click)="applyFilters()" class="px-6 py-2.5 bg-teal-600 hover:bg-teal-500 text-white rounded-lg text-sm font-semibold transition-colors shadow-lg shadow-teal-500/20">{{ 'DEALER_AREA_ASSIGNMENT.APPLY' | translate }}</button>
        <button (click)="resetFilters()" class="px-4 py-2.5 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm font-semibold transition-colors border border-white/5">{{ 'DEALER_AREA_ASSIGNMENT.RESET' | translate }}</button>
      </div>
    </div>
  </div>

  <!-- Data Table Component -->
  <div class="bg-slate-900/40 backdrop-blur-xl rounded-2xl border border-white/5 shadow-2xl overflow-hidden p-6">
    <app-data-table
      [title]="'DEALER_AREA_ASSIGNMENT.TABLE_TITLE' | translate"
      [headers]="headers"
      [data]="dealers"
      [totalElements]="totalItems"
      [currentPage]="page"
      [pageSize]="pageSize"
      [isLoading]="isLoading"
      [searchable]="false"
      [backendFiltering]="true"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
      (edit)="onEdit($event)">
    </app-data-table>
  </div>

  <!-- Edit Area Modal -->
  <div *ngIf="isModalOpen" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/70 backdrop-blur-md" (click)="closeModal()"></div>
    
    <!-- Modal Content -->
    <div class="relative bg-slate-900 border border-white/10 rounded-2xl w-full max-w-lg shadow-2xl animate-fade-in overflow-hidden">
      
      <!-- Header -->
      <div class="flex items-center justify-between p-6 border-b border-white/5 bg-slate-800/50">
        <div>
          <h3 class="text-xl font-bold text-white">{{ 'ADMIN.DEALER_AREA.ASSIGN_TITLE' | translate }}</h3>
          <p class="text-xs text-slate-400 mt-1">{{ 'ADMIN.DEALER_AREA.ASSIGN_DEALER_LABEL' | translate }}: <span class="text-teal-400">{{ editingDealer?.username }}</span></p>
        </div>
        <button (click)="closeModal()" class="text-slate-400 hover:text-white transition-colors bg-slate-800 p-2 rounded-lg hover:bg-slate-700">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Body -->
      <div class="p-6 space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">{{ 'DEALER_AREA_ASSIGNMENT.STATE' | translate }}</label>
            <input type="text" [(ngModel)]="areaForm.state" class="w-full bg-slate-950 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-teal-500 transition-colors" [placeholder]="'DEALER_AREA_ASSIGNMENT.PLACEHOLDER_STATE' | translate">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1">{{ 'DEALER_AREA_ASSIGNMENT.DISTRICT' | translate }}</label>
            <input type="text" [(ngModel)]="areaForm.district" class="w-full bg-slate-950 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-teal-500 transition-colors" [placeholder]="'DEALER_AREA_ASSIGNMENT.PLACEHOLDER_DISTRICT' | translate">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Local Area</label>
          <input type="text" [(ngModel)]="areaForm.area" class="w-full bg-slate-950 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-teal-500 transition-colors" placeholder="e.g. Hinjewadi">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">{{ 'DEALER_AREA_ASSIGNMENT.PIN_CODE' | translate }}</label>
          <input type="text" [(ngModel)]="areaForm.pinCode" class="w-full bg-slate-950 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-teal-500 transition-colors" placeholder="e.g. 411057">
        </div>
      </div>

      <!-- Footer -->
      <div class="flex items-center justify-end gap-3 p-6 border-t border-white/5 bg-slate-800/30">
        <button (click)="closeModal()" class="px-5 py-2.5 text-slate-300 hover:text-white hover:bg-slate-700/50 rounded-lg font-medium transition-colors">{{ 'COMMON.CANCEL' | translate }}</button>
        <button (click)="saveArea()" class="px-6 py-2.5 bg-teal-600 hover:bg-teal-500 text-white rounded-lg font-semibold transition-all shadow-lg shadow-teal-500/25">
          {{ 'COMMON.SAVE' | translate }}
        </button>
      </div>

    </div>
  </div>

</div>
