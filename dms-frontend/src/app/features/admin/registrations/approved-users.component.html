<div class="min-h-screen bg-[#060818] p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-8">

        <!-- Header Section -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div class="space-y-2">
                <h1 class="text-4xl font-black text-white tracking-tight flex items-center gap-4">
                    {{ 'ADMIN.APPROVED_USERS.TITLE' | translate }}
                </h1>
                <p class="text-slate-400 font-medium">{{ 'ADMIN.APPROVED_USERS.SUBTITLE' | translate }}</p>
            </div>

        </div>

        <!-- Data Table (Search + Active/Inactive Tabs built-in) -->
        <app-data-table
            [title]="'ADMIN.APPROVED_USERS.TABLE_TITLE' | translate"
            [headers]="headers"
            [data]="users"
            [isLoading]="isLoading"
            [totalElements]="totalElements"
            [totalPages]="totalPages"
            [currentPage]="currentPage"
            [pageSize]="pageSize"
            [isLast]="isLast"
            [searchable]="true"
            [showActiveInactiveFilter]="true"
            [activeTab]="activeTab"
            [activeTabLabel]="'ADMIN.APPROVED_USERS.ACTIVE_USERS' | translate"
            [inactiveTabLabel]="'ADMIN.APPROVED_USERS.INACTIVE_USERS' | translate"
            (activeTabChange)="onTabChange($event)"
            (pageChange)="loadUsers($event)"
            (pageSizeChange)="onPageSizeChange($event)">
        </app-data-table>

    </div>
</div>
