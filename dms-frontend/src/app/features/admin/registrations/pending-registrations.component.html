<div class="min-h-screen bg-[#060818] p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-6">

        <!-- Header Section -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
            <div>
                <h1 class="text-2xl md:text-3xl font-black text-white tracking-tight">
                    {{ 'ADMIN.REGISTRATION.TITLE' | translate }}
                </h1>
                <p class="text-slate-400 text-sm mt-1">{{ 'ADMIN.REGISTRATION.SUBTITLE' | translate }}</p>
            </div>

            <!-- Compact stat badge -->
            <div class="inline-flex items-center gap-2.5 px-4 py-2 bg-indigo-600/10 border border-indigo-500/20 rounded-2xl self-start sm:self-auto">
                <span class="w-7 h-7 rounded-lg bg-indigo-500/20 flex items-center justify-center text-sm font-black text-indigo-400 leading-none">
                    {{ totalElements }}
                </span>
                <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest leading-none whitespace-nowrap">
                    {{ currentTab === 'active' ? ('ADMIN.REGISTRATION.PENDING_APPROVALS' | translate) : ('ADMIN.REGISTRATION.INACTIVE_REJECTED' | translate) }}
                </p>
            </div>
        </div>

        <!-- Universal Data Table (Search + Active/Inactive tabs built in) -->
        <app-data-table
            [title]="'ADMIN.REGISTRATION.TABLE_TITLE' | translate"
            [headers]="headers"
            [data]="requests"
            [searchable]="true"
            [showActiveInactiveFilter]="true"
            [activeTab]="currentTab === 'active' ? 'ACTIVE' : 'INACTIVE'"
            [activeTabLabel]="'ADMIN.REGISTRATION.ACTIVE_REQUESTS' | translate"
            [inactiveTabLabel]="'ADMIN.REGISTRATION.INACTIVE_REJECTED' | translate"
            (activeTabChange)="onTabChange($event)"
            [totalElements]="totalElements"
            [totalPages]="totalPages"
            [currentPage]="currentPage"
            [pageSize]="pageSize"
            [isLast]="isLast"
            [isLoading]="isLoading"
            [isAdmin]="true"
            (pageChange)="loadRequests($event)"
            (pageSizeChange)="onPageSizeChange($event)"
            (approve)="onApprove($event)"
            (reject)="onReject($event)"
            (archive)="onArchive($event)"
            (restore)="onRestore($event)">
        </app-data-table>

    </div>
</div>
