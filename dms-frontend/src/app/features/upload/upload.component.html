<div class="container mx-auto px-4 py-8 md:py-16 flex items-center justify-center min-h-[80vh]">
    <!-- High-End Upload Card -->
    <div
        class="w-full max-w-2xl bg-white rounded-[2rem] md:rounded-[3rem] shadow-[0_32px_128px_rgba(79,70,229,0.1)] border border-gray-100 overflow-hidden animate-in zoom-in-95 duration-700">

        <!-- Vibrant Header Section -->
        <div
            class="px-6 py-8 md:px-12 md:py-10 bg-gradient-to-br from-gray-900 to-indigo-950 text-white relative overflow-hidden">
            <div class="absolute -right-20 -top-20 w-64 h-64 bg-indigo-500/20 rounded-full blur-[80px]"></div>
            <div class="absolute -left-10 -bottom-10 w-40 h-40 bg-violet-500/10 rounded-full blur-[60px]"></div>

            <div class="relative z-10">
                <div class="flex items-center gap-4 mb-4">
                    <div
                        class="w-12 h-12 bg-white/10 backdrop-blur-md rounded-2xl flex items-center justify-center border border-white/20">
                        <svg class="h-6 w-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                        </svg>
                    </div>
                    <span class="text-[10px] font-black uppercase tracking-[0.4em] text-indigo-400">Secure
                        Ingestion</span>
                </div>
                <h1 class="text-2xl md:text-4xl font-black tracking-tighter">{{ text.headers.upload }}</h1>
                <p class="text-gray-400 text-sm mt-2 font-medium">Encrypt and index new assets into the secure document
                    ledger</p>
            </div>
        </div>

        <!-- Form Interface -->
        <form (submit)="upload(); $event.preventDefault()" class="p-6 md:p-12 space-y-8 md:space-y-10">
            <!-- Title Entry -->
            <div class="space-y-4">
                <label for="docTitle"
                    class="block text-[10px] font-black text-gray-400 uppercase tracking-widest pl-4">Document
                    Label</label>
                <div class="relative group">
                    <div
                        class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-violet-500 rounded-[2rem] blur opacity-0 group-focus-within:opacity-20 transition duration-500">
                    </div>
                    <input id="docTitle" type="text" [(ngModel)]="docTitle" name="title" required
                        [placeholder]="text.placeholders.title"
                        class="relative w-full px-8 py-5 bg-gray-50 border-2 border-transparent rounded-[2rem] text-sm font-bold text-gray-700 outline-none focus:bg-white focus:border-indigo-600 transition-all shadow-inner" />
                </div>
            </div>

            <!-- Intelligent Drop Zone -->
            <div class="space-y-4">
                <label for="docFile"
                    class="block text-[10px] font-black text-gray-400 uppercase tracking-widest pl-4">Digital
                    Payload</label>
                <div class="relative group">
                    <input id="docFile" type="file" (change)="onFileSelected($event)" required
                        title="Select a file to upload"
                        class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />

                    <div
                        class="relative border-4 border-dashed border-gray-100 rounded-[2rem] md:rounded-[3rem] p-6 md:p-12 text-center transition-all duration-500 group-hover:border-indigo-600/30 group-hover:bg-indigo-50/30 bg-gray-50/50">
                        <!-- Visual Feedback Container -->
                        <div class="flex flex-col items-center">
                            <div class="w-24 h-24 mb-8 relative">
                                <div
                                    class="absolute inset-0 bg-indigo-600 rounded-[2rem] blur-2xl opacity-0 group-hover:opacity-20 transition-opacity">
                                </div>
                                <div
                                    class="relative w-full h-full bg-white rounded-[2rem] shadow-sm border border-gray-100 flex items-center justify-center text-indigo-600 transform group-hover:-translate-y-2 transition-transform duration-500">
                                    <svg *ngIf="!file" class="h-10 w-10 animate-bounce-subtle" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                                    </svg>
                                    <svg *ngIf="file" class="h-10 w-10 text-emerald-500 animate-in zoom-in duration-500"
                                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                </div>
                            </div>

                            <div *ngIf="!file" class="space-y-2">
                                <p class="text-sm font-black text-gray-900 uppercase tracking-widest">Select Repository
                                    File</p>
                                <p class="text-xs text-gray-400 font-medium">Or drag and drop securely into this zone
                                </p>
                            </div>

                            <div *ngIf="file" class="space-y-2 animate-in slide-in-from-bottom-2 duration-500">
                                <p class="text-sm font-black text-emerald-600 uppercase tracking-widest">Payload Ready
                                </p>
                                <p
                                    class="text-xs text-gray-500 font-bold bg-white px-4 py-2 rounded-full shadow-sm inline-block border border-gray-100">
                                    {{ file.name }}
                                </p>
                            </div>
                        </div>

                        <!-- Technical Meta Tags -->
                        <div class="mt-12 flex items-center justify-center gap-4">
                            <span
                                class="px-3 py-1 bg-white text-[9px] font-black text-gray-400 border border-gray-100 rounded-md uppercase tracking-widest">PDF</span>
                            <span
                                class="px-3 py-1 bg-white text-[9px] font-black text-gray-400 border border-gray-100 rounded-md uppercase tracking-widest">DOCX</span>
                            <span
                                class="px-3 py-1 bg-white text-[9px] font-black text-gray-400 border border-gray-100 rounded-md uppercase tracking-widest">JPG/PNG</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Global Action -->
            <div class="pt-6">
                <button type="submit" [disabled]="!file || !docTitle"
                    class="group relative w-full py-6 bg-indigo-600 text-white rounded-[2rem] text-xs font-black uppercase tracking-[0.3em] shadow-2xl shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-1 transition-all active:translate-y-0 disabled:opacity-30 disabled:grayscale disabled:cursor-not-allowed overflow-hidden">
                    <div
                        class="absolute inset-x-0 bottom-0 h-1 bg-white/20 scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-700">
                    </div>
                    <span class="relative z-10 flex items-center justify-center gap-3">
                        Initiate Upload
                        <svg class="h-4 w-4 group-hover:translate-x-1 transition-transform" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </span>
                </button>
            </div>
        </form>

        <!-- Compliance Footer -->
        <div class="px-12 py-6 bg-gray-50 border-t border-gray-100 flex items-center justify-center gap-6">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">AES-256 Encrypted</span>
            </div>
            <div class="w-px h-3 bg-gray-200"></div>
            <div class="flex items-center gap-2">
                <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Integrity Verified</span>
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes bounce-subtle {

        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(-3px);
        }
    }

    .animate-bounce-subtle {
        animation: bounce-subtle 3s infinite ease-in-out;
    }
</style>
