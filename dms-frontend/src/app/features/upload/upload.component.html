<div class="max-w-xl mx-auto mt-8 bg-white p-8 border border-gray-200 rounded-xl shadow-lg">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">{{ text.headers.upload }}</h2>

    <form (submit)="upload(); $event.preventDefault()" class="space-y-6">
        <div>
            <label for="docTitle" class="block text-sm font-semibold text-gray-700 mb-2">{{ text.labels.title }}</label>
            <input id="docTitle" type="text" [(ngModel)]="docTitle" name="title" required
                [placeholder]="text.placeholders.title"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all" />
        </div>

        <div>
            <label for="docFile" class="block text-sm font-semibold text-gray-700 mb-2">{{ text.labels.file }}</label>
            <div class="relative group">
                <input id="docFile" type="file" (change)="onFileSelected($event)" required
                    class="w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer transition-all" />
            </div>
            <p class="mt-2 text-xs text-gray-500 italic">Supported formats: .pdf, .txt, .docx, .png, .jpg</p>
        </div>

        <button type="submit" [disabled]="!file || !docTitle"
            class="w-full py-3.5 bg-indigo-600 text-white font-bold rounded-lg shadow-md hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-200 disabled:opacity-50 disabled:cursor-not-allowed transform active:scale-[0.98] transition-all">
            {{ text.common.submit }}
        </button>
    </form>
</div>
