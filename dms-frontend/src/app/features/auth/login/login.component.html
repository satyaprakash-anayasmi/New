<div class="min-h-screen flex items-center justify-center relative overflow-hidden bg-slate-950 font-['Outfit']">
    <!-- Clean background glows -->
    <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/5 to-purple-500/5 pointer-events-none"></div>

    <div class="relative w-full max-w-lg px-6 py-12 md:py-20 z-10">
        <!-- Main Card -->
        <div
            class="w-full bg-white/[0.03] backdrop-blur-2xl p-8 md:p-12 rounded-[2.5rem] shadow-[0_0_50px_rgba(0,0,0,0.3)] border border-white/10 relative overflow-hidden">
            <!-- Glass gloss effect -->
            <div
                class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-white/10 to-transparent pointer-events-none">
            </div>

            <!-- Content Header -->
            <div class="relative text-center mb-10">
                <div
                    class="inline-flex items-center justify-center p-4 bg-gradient-to-tr from-indigo-500 to-fuchsia-500 rounded-3xl shadow-xl mb-6 transform hover:scale-110 transition-transform duration-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-4xl font-bold text-white tracking-tight mb-2">Welcome Back</h2>
                <p class="text-slate-400 font-medium">Document Management System</p>
            </div>

            <!-- Login Form -->
            <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="relative space-y-6">
                <!-- Username Field -->
                <div class="space-y-2">
                    <label for="usernameInput" class="block ml-1 text-sm font-medium text-slate-300">{{
                        text.labels.username }}</label>
                    <div class="group relative">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-indigo-400 transition-colors">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input type="text" id="usernameInput" [(ngModel)]="credentials.username" name="username"
                            required (input)="true"
                            class="w-full pl-12 pr-4 py-4 bg-white/5 border border-white/10 rounded-2xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all shadow-inner"
                            [placeholder]="text.placeholders.username">
                    </div>
                </div>

                <!-- Password Field -->
                <div class="space-y-2">
                    <label for="passwordInput" class="block ml-1 text-sm font-medium text-slate-300">{{
                        text.labels.password }}</label>
                    <div class="group relative">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-indigo-400 transition-colors">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input [type]="showPassword ? 'text' : 'password'" id="passwordInput"
                            [(ngModel)]="credentials.password" name="password" required (input)="true"
                            class="w-full pl-12 pr-12 py-4 bg-white/5 border border-white/10 rounded-2xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all shadow-inner"
                            [placeholder]="text.placeholders.password">
                        <button type="button"
                            class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-500 hover:text-white transition-colors"
                            (click)="showPassword = !showPassword" title="Toggle password visibility">
                            <svg *ngIf="!showPassword" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg *ngIf="showPassword" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.29 3.29m0 0a10.05 10.05 0 015.71-1.29c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between pb-2">
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox"
                            class="h-5 w-5 rounded border-white/10 bg-white/5 text-indigo-500 focus:ring-offset-slate-950 focus:ring-indigo-500 transition-all">
                        <span
                            class="ml-3 text-sm font-medium text-slate-400 group-hover:text-slate-300 transition-colors">Remember
                            me</span>
                    </label>
                    <a href="#"
                        class="text-sm font-medium text-indigo-400 hover:text-indigo-300 hover:underline transition-all">Forgot
                        password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" [disabled]="isLoading"
                    class="w-full relative py-4 px-6 bg-gradient-to-r from-indigo-600 via-indigo-500 to-purple-600 text-white font-bold rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.3)] hover:shadow-indigo-500/20 active:scale-95 transition-all disabled:opacity-50 flex items-center justify-center gap-3 overflow-hidden">
                    <div
                        class="absolute top-0 left-[-100%] w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent hover:animate-shimmer">
                    </div>
                    <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    <span>{{ isLoading ? 'Entering...' : 'Log In' }}</span>
                </button>
            </form>

            <!-- Download Section -->
            <div class="mt-8 pt-8 border-t border-white/10 text-center">
                <p class="text-slate-400 text-sm mb-4">Access your documents on the go</p>
                <a href="https://github.com/satyaprakash-anayasmi/New/actions" target="_blank"
                    class="inline-flex items-center justify-center transition-transform hover:scale-105">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg"
                        alt="Download Android APK" class="h-12">
                </a>
            </div>

            <div class="mt-10 text-center">
                <p class="text-slate-500 text-sm">Don't have an account? <a href="#"
                        class="text-indigo-400 font-bold hover:text-indigo-300">Contact Admin</a></p>
            </div>
        </div>
    </div>
</div>
