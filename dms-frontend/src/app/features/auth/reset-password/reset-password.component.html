<div class="min-h-screen flex items-center justify-center relative overflow-hidden bg-slate-950 font-['Outfit']">
    <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/5 to-purple-500/5 pointer-events-none"></div>

    <div class="relative w-full max-w-lg px-6 py-12 z-10">
        <div
            class="w-full bg-white/[0.03] backdrop-blur-2xl p-8 md:p-12 rounded-[2.5rem] shadow-2xl border border-white/10 relative overflow-hidden">
            <!-- Header -->
            <div class="relative text-center mb-10">
                <div class="inline-flex items-center justify-center p-4 bg-emerald-600/20 rounded-3xl shadow-xl mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-emerald-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
                <h2 class="text-3xl font-bold text-white tracking-tight mb-2">{{ 'AUTH.RESET_PASSWORD.TITLE' | translate }}</h2>
                <p class="text-slate-400 font-medium">{{ 'AUTH.RESET_PASSWORD.SUBTITLE' | translate }} {{ data.identifier }}</p>
            </div>

            <form (ngSubmit)="onSubmit()" #resetForm="ngForm" class="space-y-6">
                <!-- OTP Code -->
                <div class="space-y-2">
                    <label class="block ml-1 text-sm font-medium text-slate-300">{{ 'AUTH.FORGOT_PASSWORD.OTP_LABEL' |
                        translate }}</label>
                    <input type="text" [(ngModel)]="data.otpCode" name="otpCode" required maxlength="6"
                        class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white text-center text-2xl tracking-[0.5em] font-mono focus:ring-2 focus:ring-indigo-500 transition-all"
                        placeholder="000000">
                </div>

                <!-- New Password -->
                <div class="grid grid-cols-1 gap-4">
                    <div class="space-y-2">
                        <label class="block ml-1 text-sm font-medium text-slate-300">{{
                            'AUTH.FORGOT_PASSWORD.NEW_PASSWORD_LABEL' | translate }}</label>
                        <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="data.newPassword"
                            name="newPassword" required
                            class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white focus:ring-2 focus:ring-indigo-500 transition-all"
                            placeholder="••••••••">
                    </div>
                    <div class="space-y-2">
                        <label class="block ml-1 text-sm font-medium text-slate-300">{{ 'AUTH.RESET_PASSWORD.CONFIRM_PASSWORD' | translate }}</label>
                        <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="data.confirmPassword"
                            name="confirmPassword" required
                            class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white focus:ring-2 focus:ring-indigo-500 transition-all"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="flex justify-end pr-2">
                    <button type="button" (click)="showPassword = !showPassword"
                        class="text-xs text-slate-500 hover:text-white transition-colors">
                        {{ showPassword ? ('AUTH.RESET_PASSWORD.HIDE_PASSWORD' | translate) : ('AUTH.RESET_PASSWORD.SHOW_PASSWORD' | translate) }}
                    </button>
                </div>

                <button type="submit" [disabled]="isLoading"
                    class="w-full py-4 bg-gradient-to-r from-emerald-600 to-teal-600 text-white font-bold rounded-2xl shadow-lg hover:shadow-emerald-500/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <span *ngIf="isLoading"
                        class="animate-spin rounded-full h-4 w-4 border-2 border-white/20 border-t-white"></span>
                    {{ 'AUTH.FORGOT_PASSWORD.BTN_RESET' | translate }}
                </button>
            </form>
        </div>
    </div>
</div>
