<!-- Dropdown Trigger -->
<div 
  class="app-select-trigger" 
  [class.disabled]="disabled"
  [class.open]="isOpen"
  (click)="toggleDropdown()">
  
  <span class="app-select-value" [class.placeholder]="!value || value.length === 0">
    {{ value && value.length > 0 ? selectedLabel : placeholder }}
  </span>
  
  <div class="flex items-center gap-1.5 flex-shrink-0">
    <!-- Clear/Cancel (✕) icon - only visible when a value is selected and clearable is true -->
    <button 
      *ngIf="clearable && value && value.length > 0 && !disabled" 
      type="button" 
      class="app-select-clear-btn" 
      (click)="clearSelection($event)"
      aria-label="Clear selection">
      ✕
    </button>

    <div class="app-select-arrow" [class.open]="isOpen">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
    </div>
  </div>
</div>

<!-- Inline fixed-position Dropdown Panel (stays in Angular's change detection tree) -->
<div *ngIf="isOpen"
  class="app-select-dropdown shadow-2xl"
  (click)="$event.stopPropagation()">

  <!-- Search Box inside Dropdown Panel -->
  <div *ngIf="searchable" class="app-select-search-container">
    <div class="relative flex items-center">
      <input 
        type="text" 
        class="app-select-search-input" 
        [value]="searchTerm"
        (input)="onSearchInput($event)"
        placeholder="Search..."
        autocomplete="off"
      />
      <div class="absolute right-3 pointer-events-none text-slate-400">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/>
          <path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Options List -->
  <div class="app-select-options">
    <div 
      *ngFor="let opt of filteredOptions" 
      class="app-select-option"
      [class.selected]="isSelected(opt)"
      (click)="selectOption(opt); $event.stopPropagation()">
      <div class="flex items-center gap-2">
        <input type="checkbox" [checked]="isSelected(opt)" class="w-4 h-4 text-indigo-600 rounded border-gray-300 pointer-events-none">
        <span>{{ opt.name }}</span>
      </div>
    </div>

    <!-- Add custom item option -->
    <div 
      *ngIf="searchable && searchTerm.trim() && !hasExactMatch(searchTerm)"
      class="app-select-option app-select-add-new text-blue-600 font-semibold border-t border-slate-100"
      (click)="selectOption({ id: searchTerm.trim(), name: searchTerm.trim() })">
      + Add "{{ searchTerm.trim() }}"
    </div>

    <div *ngIf="filteredOptions.length === 0 && (!searchable || !searchTerm.trim())" class="app-select-empty">
      No matches found
    </div>
  </div>
</div>
