<dialog *ngIf="show" #viewerDialog (cancel)="onClose()" aria-labelledby="viewer-title"
    class="fixed inset-0 z-[100] flex items-center justify-center p-0 md:p-8 pointer-events-auto bg-transparent border-none w-full h-full max-w-none max-h-none overflow-hidden m-0">
    <button
        class="absolute inset-0 bg-slate-950/60 backdrop-blur-md animate-in fade-in duration-300 cursor-pointer border-none w-full h-full p-0 outline-none"
        (click)="onClose()" aria-label="Close Viewer">
    </button>

    <div
        class="relative bg-white w-full h-full md:h-auto md:max-w-5xl md:max-h-[90vh] md:rounded-[2rem] shadow-2xl flex flex-col overflow-hidden animate-in zoom-in-95 duration-500">

        <!-- Header -->
        <div
            class="px-6 py-4 md:px-10 md:py-6 flex items-center justify-between border-b border-slate-100 bg-slate-50/30">
            <div class="flex items-center gap-4">
                <div
                    class="w-10 h-10 md:w-12 md:h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <div class="overflow-hidden">
                    <h2 id="viewer-title" class="text-lg md:text-xl font-bold text-slate-900 truncate">{{
                        document?.title }}</h2>
                    <span class="text-[9px] font-black text-indigo-400 uppercase tracking-widest block">#{{ document?.id
                        }}</span>
                </div>
            </div>

            <button (click)="onClose()" aria-label="Close" title="Close"
                class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-all">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto flex flex-col md:flex-row">
            <!-- Details Section -->
            <div
                class="md:w-72 p-6 md:p-8 bg-slate-50 border-b md:border-b-0 md:border-r border-slate-100 flex flex-col gap-6">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-3">Provenance</p>
                    <div class="flex items-center gap-3 p-3 bg-white rounded-xl border border-slate-200">
                        <div
                            class="w-8 h-8 rounded-lg bg-indigo-100 flex items-center justify-center text-[10px] font-black text-indigo-600">
                            {{ (document?.uploaderUsername || '').substring(0,2).toUpperCase() }}
                        </div>
                        <p class="text-sm font-bold text-slate-700 truncate">{{ document?.uploaderUsername }}</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-1 gap-3">
                    <div class="p-4 bg-white rounded-xl border border-slate-200">
                        <span class="text-[8px] font-bold text-slate-400 uppercase block mb-1">Format</span>
                        <span class="text-xs font-black text-slate-900 uppercase">{{ document?.fileType }}</span>
                    </div>
                    <div class="p-4 bg-white rounded-xl border border-slate-200">
                        <span class="text-[8px] font-bold text-slate-400 uppercase block mb-1">Size</span>
                        <span class="text-xs font-black text-slate-900 uppercase">{{ formatSize(document?.fileSize)
                            }}</span>
                    </div>
                </div>

                <div class="mt-auto pt-4">
                    <button (click)="downloadRequested()"
                        class="w-full py-4 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                        Get File
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Content Section -->
            <div
                class="flex-1 bg-slate-200/50 p-6 md:p-12 flex items-center justify-center relative min-h-[350px] overflow-hidden">
                <div *ngIf="loading" class="flex flex-col items-center gap-4">
                    <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin">
                    </div>
                    <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">Scanning Registry...</p>
                </div>

                <div *ngIf="!loading && previewUrl" class="max-w-full max-h-full flex items-center justify-center p-4">
                    <!-- Passport Size Frame -->
                    <div
                        class="bg-white p-3 rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.15)] border-4 border-white inline-block animate-in zoom-in-90 duration-500">
                        <img *ngIf="isImage" [src]="previewUrl"
                            class="w-auto h-auto max-w-[240px] md:max-w-[320px] max-h-[400px] block object-contain rounded-sm grayscale-[0.1] contrast-[1.1]"
                            alt="Passport Preview">

                        <iframe *ngIf="!isImage" [src]="previewUrl"
                            class="w-[85vw] md:w-[50vw] h-[60vh] border-none rounded-lg block"
                            sandbox="allow-popups allow-popups-to-escape-sandbox allow-downloads"
                            title="Document Content Preview"></iframe>

                        <!-- Document Seal/Label -->
                        <div *ngIf="isImage"
                            class="mt-3 pt-3 border-t border-slate-100 flex items-center justify-between">
                            <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Official
                                Record</span>
                            <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</dialog>
