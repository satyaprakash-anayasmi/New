<div class="w-full">
  <label class="block text-xs font-semibold text-slate-400 mb-2 uppercase tracking-wider">{{ label }}</label>
  
  <div *ngIf="!currentUrl && !isUploading" class="relative group cursor-pointer">
    <input type="file" accept="image/*" capture="environment" (change)="onFileSelected($event)" 
           class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
    <div class="flex flex-col items-center justify-center p-6 border-2 border-dashed border-white/10 rounded-xl bg-slate-900/50 hover:bg-white/5 transition-all group-hover:border-indigo-500/50">
      <div class="p-3 bg-indigo-500/10 rounded-full mb-3 text-indigo-400 group-hover:scale-110 transition-transform">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
        </svg>
      </div>
      <p class="text-sm font-medium text-slate-300">Tap to upload or take photo</p>
      <p class="text-xs text-slate-500 mt-1">PNG, JPG up to 5MB</p>
    </div>
  </div>

  <div *ngIf="isUploading" class="p-6 border border-white/10 rounded-xl bg-slate-900/50 flex flex-col items-center justify-center">
    <svg class="w-8 h-8 text-indigo-500 animate-spin mb-3" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <div class="w-full bg-slate-800 rounded-full h-2 mt-2 overflow-hidden">
      <div class="bg-indigo-500 h-2 transition-all duration-300 ease-out" [style.width.%]="uploadProgress"></div>
    </div>
    <p class="text-xs text-slate-400 mt-2 font-medium">Uploading... {{ uploadProgress }}%</p>
  </div>

  <div *ngIf="currentUrl && !isUploading" class="relative group border border-white/10 rounded-xl overflow-hidden bg-slate-900/50">
    <img [src]="currentUrl" alt="Uploaded preview" class="w-full h-32 object-cover" />
    
    <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-3">
      <div class="relative cursor-pointer">
        <input type="file" accept="image/*" capture="environment" (change)="onFileSelected($event)" 
               class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
        <button class="p-2 bg-indigo-500/20 text-indigo-400 rounded-lg hover:bg-indigo-500/40 hover:text-white transition-colors" title="Replace">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
        </button>
      </div>
      
      <button (click)="removeFile()" class="p-2 bg-rose-500/20 text-rose-400 rounded-lg hover:bg-rose-500/40 hover:text-white transition-colors" title="Remove">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      </button>
    </div>
  </div>
</div>
