<aside class="sidebar-container bg-slate-950 text-white flex flex-col border-r border-white/5 font-['Outfit']">
    <!-- Brand Section -->
    <div class="brand-section">
        <div class="logo-box">
            <img src="/assets/images/logo.png" alt="Bazaar Janakalyan Logo" class="w-12 h-12 object-contain" />
        </div>
        <h2 class="brand-title">{{ 'COMMON.APP_NAME' | translate }}</h2>
    </div>

    <!-- Navigation -->
    <nav class="nav-content scrollbar-hide">
        <!-- Inactive Account Banner -->
        <div *ngIf="!isActive"
            class="mx-3 mb-4 rounded-2xl bg-amber-500/10 border border-amber-500/25 p-4 space-y-2">
            <div class="flex items-center gap-2">
                <span class="text-amber-400 text-base">⚠️</span>
                <p class="text-amber-400 text-xs font-black uppercase tracking-widest">{{ 'NAV.BANNER.TITLE' | translate }}</p>
            </div>
            <p class="text-slate-400 text-xs leading-relaxed">
                {{ 'NAV.BANNER.DESC' | translate }}
            </p>
            <a routerLink="/payment"
                class="block text-center px-3 py-2 rounded-xl bg-amber-500 hover:bg-amber-400
                       text-black text-xs font-black uppercase tracking-wide transition-colors">
                {{ 'NAV.BANNER.BTN_PAY' | translate }} →
            </a>
        </div>

        <div class="nav-group">
            <p class="nav-section-label">{{ 'NAV.OPERATIONS' | translate }}</p>
            <ul class="nav-list">
                <li *ngFor="let menu of allowedMenus">
                    <a [routerLink]="menu.path" routerLinkActive="active-menu-item" class="nav-link group">
                        <!-- Active Indicator Beam -->
                        <div class="active-beam"></div>

                        <!-- Icon Wrapper -->
                        <div class="icon-wrapper group-hover:scale-110 transition-transform duration-300">
                            <!-- Home -->
                            <svg *ngIf="menu.icon === 'home'" class="w-5 h-5 text-indigo-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                            </svg>
                            <!-- Dashboard -->
                            <svg *ngIf="menu.icon === 'grid'" class="w-5 h-5 text-indigo-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                            </svg>
                            <!-- Facilities -->
                            <svg *ngIf="menu.icon === 'star'" class="w-5 h-5 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                            </svg>
                            <!-- Growth -->
                            <svg *ngIf="menu.icon === 'network'" class="w-5 h-5 text-fuchsia-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />
                            </svg>
                            <!-- Referral Tree -->
                            <svg *ngIf="menu.icon === 'tree'" class="w-5 h-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                            </svg>
                            <!-- Master Management / Settings -->
                            <svg *ngIf="menu.icon === 'settings'" class="w-5 h-5 text-orange-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <!-- User Requests -->
                            <svg *ngIf="menu.icon === 'users'" class="w-5 h-5 text-indigo-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                            </svg>
                            <!-- Profile -->
                            <svg *ngIf="menu.icon === 'profile'" class="w-5 h-5 text-cyan-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <!-- Approved Users -->
                            <svg *ngIf="menu.icon === 'user-check'" class="w-5 h-5 text-blue-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                            </svg>
                            <!-- Payment (user) -->
                            <svg *ngIf="menu.icon === 'credit-card'" class="w-5 h-5 text-green-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                            </svg>
                            <!-- Payment Review (admin) -->
                            <svg *ngIf="menu.icon === 'wallet'" class="w-5 h-5 text-yellow-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" />
                            </svg>
                            <!-- Screen Assignment (admin) -->
                            <svg *ngIf="menu.icon === 'desktop'" class="w-5 h-5 text-violet-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                            <!-- Dealer Management (admin) -->
                            <svg *ngIf="menu.icon === 'briefcase'" class="w-5 h-5 text-teal-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                            <!-- Dealer Area Map (admin) -->
                            <svg *ngIf="menu.icon === 'map'" class="w-5 h-5 text-pink-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                            </svg>
                        </div>
                        <span class="label-text">{{ menu.label | translate }}</span>

                        <!-- Premium Hover Glow -->
                        <div class="hover-glow"></div>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Footer Visual -->
    <div class="sidebar-footer">
        <div class="status-indicator">
            <span class="pulse-dot"></span>
            <span class="status-text">{{ 'NAV.SYSTEM_STATUS' | translate }}</span>
        </div>
    </div>
</aside>
