<aside class="w-72 h-screen bg-slate-950 text-white flex flex-col border-r border-white/5 font-['Outfit']">
    <!-- Brand Section -->
    <div
        class="h-20 flex items-center px-6 gap-4 border-b border-white/5 bg-slate-950/50 backdrop-blur-md sticky top-0 z-10">
        <div class="p-2.5 bg-gradient-to-tr from-indigo-500 to-fuchsia-500 rounded-xl shadow-lg shadow-indigo-500/20">
            <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
        </div>
        <h2
            class="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">
            DMS Portal</h2>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto py-8 px-4 space-y-8 scrollbar-hide">
        <div>
            <p class="px-4 text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500 mb-4">Operations</p>
            <ul class="space-y-1.5">
                <li *ngFor="let menu of allowedMenus">
                    <a [routerLink]="menu.path" routerLinkActive="bg-white/5 text-white active-link"
                        class="group relative flex items-center gap-4 py-3.5 px-4 rounded-2xl transition-all duration-300 hover:bg-white/5 text-slate-400 hover:text-white group">
                        <div
                            class="absolute left-0 w-1 h-0 bg-indigo-500 rounded-full transition-all duration-300 active-indicator group-[.active-link]:h-6">
                        </div>

                        <div class="p-1.5 rounded-lg transition-colors group-hover:bg-slate-800">
                            <svg *ngIf="menu.label === 'Dashboard'" class="w-5 h-5 text-indigo-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                            </svg>
                            <svg *ngIf="menu.label === 'Upload Document'" class="w-5 h-5 text-fuchsia-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                            </svg>
                            <svg *ngIf="menu.label === 'Review Queue'" class="w-5 h-5 text-amber-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                            </svg>
                            <svg *ngIf="menu.label === 'Assign Document'" class="w-5 h-5 text-emerald-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                            </svg>
                        </div>
                        <span class="font-medium tracking-wide">{{ menu.label }}</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>
</aside>
