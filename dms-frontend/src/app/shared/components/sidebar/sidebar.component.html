<aside class="w-64 h-screen bg-gray-900 text-white flex flex-col">
    <div class="h-16 flex items-center justify-center border-b border-gray-800">
        <h2 class="text-xl font-bold uppercase tracking-wider">DMS App</h2>
    </div>
    <nav class="flex-1 overflow-y-auto mt-4 px-2">
        <ul class="space-y-2">
            <li *ngFor="let menu of allowedMenus">
                <a [routerLink]="menu.path" routerLinkActive="bg-indigo-600 text-white shadow-lg"
                    class="flex items-center gap-3 py-3 px-4 rounded-xl transition-all duration-200 hover:bg-gray-800 hover:text-white text-gray-300 font-medium">
                    <svg *ngIf="menu.label === 'Dashboard'" class="w-5 h-5 flex-shrink-0 text-indigo-300" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                    </svg>
                    <svg *ngIf="menu.label === 'Upload Document'" class="w-5 h-5 flex-shrink-0 text-purple-300"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    <svg *ngIf="menu.label === 'Review Queue'" class="w-5 h-5 flex-shrink-0 text-amber-300" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                    </svg>
                    <svg *ngIf="menu.label === 'Assign Document'" class="w-5 h-5 flex-shrink-0 text-emerald-400"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    <span>{{ menu.label }}</span>
                </a>
            </li>
        </ul>
    </nav>
</aside>
