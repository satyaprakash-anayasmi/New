# Production Properties
server.port=${PORT:8080}
server.address=0.0.0.0

# Database driver only - URL/user/pass come from ENTRYPOINT command-line args
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Swagger / OpenAPI - Disabled in Prod for Memory Efficiency
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Logging - Quiet in Prod
logging.level.root=WARN
logging.level.com.example.documentmanagement=INFO

# JWT
app.jwt.secret=${JWT_SECRET:dms-default-jwt-secret-key-2026}
app.jwt.expiration=3600000

# Security default passwords
app.default.admin.password=${ADMIN_PASSWORD:admin_Sec#2026}
app.default.reviewer.password=${REVIEWER_PASSWORD:reviewer_Sec#2026}
app.default.uploader.password=${UPLOADER_PASSWORD:uploader_Sec#2026}

# HikariCP
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.validation-query=SELECT 1

# Multipart
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
