# Production Properties
server.port=8080
server.address=0.0.0.0



# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File Storage
app.file.storage.location=/var/lib/dms/uploads

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=3600000

# Security default passwords (should ideally be changed manually)
app.default.admin.password=${ADMIN_PASSWORD}
app.default.reviewer.password=${REVIEWER_PASSWORD}
app.default.uploader.password=${UPLOADER_PASSWORD}

# Multipart
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
