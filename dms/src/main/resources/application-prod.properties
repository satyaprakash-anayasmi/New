# Production Properties
server.port=8080
server.address=0.0.0.0



# Database - assembled from Render's discrete DB_* environment variables
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File Storage
app.file.storage.location=./uploads

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=3600000

# Security default passwords (should ideally be changed manually)
app.default.admin.password=${ADMIN_PASSWORD}
app.default.reviewer.password=${REVIEWER_PASSWORD}
app.default.uploader.password=${UPLOADER_PASSWORD}

# Performance & Startup
spring.main.lazy-initialization=true
spring.datasource.hikari.initialization-fail-timeout=30000
spring.datasource.hikari.connection-timeout=30000

# Multipart
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
