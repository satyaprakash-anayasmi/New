# Production Properties
server.port=8080
server.address=0.0.0.0

# Database - configured via command-line args from Dockerfile ENTRYPOINT
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File Storage
app.file.storage.location=./uploads

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=3600000

# Security default passwords
app.default.admin.password=${ADMIN_PASSWORD}
app.default.reviewer.password=${REVIEWER_PASSWORD}
app.default.uploader.password=${UPLOADER_PASSWORD}

# HikariCP
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000

# Multipart
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
