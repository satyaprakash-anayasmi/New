spring.application.name=dms

# Server Port
server.port=8080
server.address=0.0.0.0

# Profiles
spring.profiles.active=dev

# Database (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/dms_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# File Storage properties
app.file.storage.location=./uploads

# JWT Secret
app.jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9}
app.default.admin.password=${ADMIN_PASSWORD:admin_Sec#2026}
app.default.reviewer.password=${REVIEWER_PASSWORD:reviewer_Sec#2026}
app.default.uploader.password=${UPLOADER_PASSWORD:uploader_Sec#2026}
app.jwt.expiration=3600000
#1 hour

# Swagger Settings
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator Endpoints
management.endpoints.web.exposure.include=health,info

# Multipart File Upload Settings
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
