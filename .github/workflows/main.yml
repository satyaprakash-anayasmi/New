name: Project CI/CD

on:
  push:
    branches: [ main, develop, uat ]
  workflow_dispatch:

env:
  ENVIRONMENT: ${{ github.ref_name == 'main' && 'production' || (github.ref_name == 'uat' && 'uat' || 'development') }}

jobs:
  backend-build:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      
      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Build with Maven
        run: |
          cd dms
          mvn clean package -DskipTests -P${{ env.ENVIRONMENT }}
          
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-jar
          path: dms/target/*.jar

  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dms-frontend/package-lock.json
          
      - name: Build Angular
        run: |
          cd dms-frontend
          npm ci
          npm run build -- --configuration=production
          
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-dist
          path: dms-frontend/dist/dms-frontend/browser

  mobile-build:
    name: Build Mobile APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Install Dependencies
        run: |
          cd dms-frontend
          npm ci
          
      - name: Build Android APK
        run: |
          cd dms-frontend
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: mobile-apk
          path: dms-frontend/android/app/build/outputs/apk/debug/app-debug.apk

  deploy:
    name: Deploy to Server
    needs: [backend-build, frontend-build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: deploy
          
      - name: Deploy to Server via SSH
        uses: appleboy/scp-action@a6e43c3aaf4e8e6b0b15bf34e19d71118f6b1ca7
        continue-on-error: true
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/*"
          target: "/var/www/dms"
          strip_components: 1

      - name: Post-Deployment Execution
        uses: appleboy/ssh-action@1530429296e979861824d74fb800013190b5dee0
        continue-on-error: true
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/dms
            # Add command to restart services
