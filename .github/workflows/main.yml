name: Project CI/CD

on:
  push:
    branches: [ main, develop, uat ]
  workflow_dispatch:

env:
  ENVIRONMENT: ${{ github.ref_name == 'main' && 'production' || (github.ref_name == 'uat' && 'uat' || 'development') }}

jobs:
  backend-build:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      
      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Build with Maven
        run: |
          cd dms
          mvn clean package -DskipTests -P${{ env.ENVIRONMENT }}
          
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-jar
          path: dms/target/*.jar

  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dms-frontend/package-lock.json
          
      - name: Build Angular
        run: |
          cd dms-frontend
          npm install --legacy-peer-deps
          npm run build -- --configuration=production
          
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-dist
          path: dms-frontend/dist/dms-frontend/browser

  mobile-build:
    name: Build Mobile APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Install Dependencies
        run: |
          cd dms-frontend
          npm install --legacy-peer-deps
          
      - name: Build Android APK
        run: |
          cd dms-frontend
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: mobile-apk
          path: dms-frontend/android/app/build/outputs/apk/debug/app-debug.apk

  # (Deployment hidden temporarily to bypass strict repository security policies)
  # Once you allow 'appleboy' actions in GitHub Settings, we can re-enable this.
